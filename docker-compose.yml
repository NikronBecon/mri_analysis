services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mri_analysis}
      POSTGRES_USER: ${POSTGRES_USER:-mri}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mri}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mri} -d ${POSTGRES_DB:-mri_analysis}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  reconstruction-service:
    build:
      context: .
      dockerfile: Dockerfile.reconstruction
    environment:
      STORAGE_MODE: s3
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-mri-analysis}
      INFERENCE_DEVICE: ${INFERENCE_DEVICE:-cpu}
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  detection-service:
    build:
      context: .
      dockerfile: Dockerfile.detection
    environment:
      STORAGE_MODE: s3
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-mri-analysis}
      INFERENCE_DEVICE: ${INFERENCE_DEVICE:-cpu}
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  pipeline-api:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mri}:${POSTGRES_PASSWORD:-mri}@postgres:5432/${POSTGRES_DB:-mri_analysis}
      STORAGE_MODE: s3
      STORAGE_ENDPOINT_URL: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-minioadmin}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-mri-analysis}
      RECONSTRUCTION_SERVICE_URL: http://reconstruction-service:8000
      DETECTION_SERVICE_URL: http://detection-service:8000
      WORKER_POLL_INTERVAL_SECONDS: 1.0
      INFERENCE_TIMEOUT_SECONDS: 60
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      reconstruction-service:
        condition: service_healthy
      detection-service:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  minio-data:
